name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - test

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (dev/staging/prod)"
        required: true
        default: dev

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    env:
      TF_VERSION: 1.7.5

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

        # configure aws credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set environment (PR = dev default)
        run: echo "ENV=dev" >> $GITHUB_ENV

      # Verify Terraform version
      - name: Terraform Version
        run: terraform version

      # Initialize Terraform
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=saas-infra-tfstate-704225640883" \
            -backend-config="key=${{ env.ENV }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: environments/${{ env.ENV }}

      # Check formatting
      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: environments/${{ env.ENV }}

      # Validate configuration
      - name: Terraform Validate
        run: terraform validate
        working-directory: environments/${{ env.ENV }}

      # Generate execution plan
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: environments/${{ env.ENV }}

      # Upload plan artifact
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: environments/${{ env.ENV }}/tfplan
        

      # Apply only on main branch
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: environments/${{ env.ENV }}